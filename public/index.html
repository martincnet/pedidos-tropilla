<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tropilla — Pedidos del Dia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --wine: #6b2d3e;
      --wine-dark: #522231;
      --wine-light: #9b4d5e;
      --wine-pale: #fdf0f2;
      --wine-border: #e8d5d8;
      --text: #1e1e2e;
      --text-secondary: #64647a;
      --text-muted: #9c9cb0;
      --white: #fff;
      --gray-bg: #f4f2f7;
      --green: #16a34a;
      --green-light: #dcfce7;
      --red: #dc2626;
      --red-light: #fef2f2;
      --blue: #2563eb;
      --amber: #f59e0b;
      --amber-light: #fef3c7;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 4px 16px rgba(107,45,62,0.08), 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 32px rgba(107,45,62,0.12), 0 2px 6px rgba(0,0,0,0.06);
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, var(--wine-dark) 0%, var(--wine) 50%, var(--wine-light) 100%);
      color: white;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(107,45,62,0.25);
    }

    header .brand {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    header .right-section {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .date {
      font-size: 13px;
      opacity: 0.75;
      font-weight: 400;
    }

    header .nav-link {
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      transition: var(--transition);
      backdrop-filter: blur(4px);
      background: rgba(255,255,255,0.08);
    }
    header .nav-link:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.4);
      color: white;
    }

    /* LAYOUT */
    .container {
      max-width: 1500px;
      margin: 0 auto;
      padding: 24px 20px;
      display: grid;
      grid-template-columns: 550px 1fr;
      gap: 24px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; padding: 16px 12px; gap: 16px; }
    }

    /* CARD */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(107,45,62,0.06);
      transition: box-shadow var(--transition);
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--wine-border);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--wine);
      background: linear-gradient(180deg, rgba(253,240,242,0.5) 0%, transparent 100%);
    }

    .card-body { padding: 20px; }

    /* TEXTAREA */
    textarea {
      width: 100%;
      min-height: 130px;
      border: 1.5px solid #e0dce5;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      color: var(--text);
      background: var(--white);
      line-height: 1.5;
    }
    textarea:focus {
      border-color: var(--wine);
      box-shadow: 0 0 0 3px rgba(107,45,62,0.1);
    }
    textarea::placeholder { color: #b8b4c0; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all var(--transition);
      text-align: center;
      font-family: inherit;
      letter-spacing: -0.1px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--wine);
      color: white;
      box-shadow: 0 2px 8px rgba(107,45,62,0.2);
    }
    .btn-primary:hover:not(:disabled) {
      background: var(--wine-dark);
      box-shadow: 0 4px 12px rgba(107,45,62,0.3);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--white);
      color: var(--text-secondary);
      border: 1.5px solid #e0dce5;
    }
    .btn-secondary:hover:not(:disabled) {
      background: var(--gray-bg);
      border-color: #ccc8d0;
      color: var(--text);
    }

    .btn-success {
      background: var(--green);
      color: white;
      box-shadow: 0 2px 8px rgba(22,163,74,0.2);
    }
    .btn-success:hover:not(:disabled) {
      background: #15803d;
      box-shadow: 0 4px 12px rgba(22,163,74,0.3);
      transform: translateY(-1px);
    }

    .btn-full { width: 100%; }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .btn-row .btn { flex: 1; }

    /* ORDER ACTION BUTTONS */
    .btn-icon {
      background: none;
      border: 1.5px solid #e0dce5;
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      white-space: nowrap;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .btn-icon:hover {
      background: var(--wine-pale);
      border-color: var(--wine-border);
      color: var(--wine);
    }

    .btn-icon-delete {
      background: none;
      border: none;
      color: #d0cdd6;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 6px;
      line-height: 1;
      transition: all var(--transition);
      border-radius: 6px;
    }
    .btn-icon-delete:hover {
      color: var(--red);
      background: var(--red-light);
    }

    /* EXTRACTED FORM */
    .extracted-form {
      margin-top: 16px;
      display: none;
      animation: slideDown 0.25s ease-out;
    }
    .extracted-form.visible { display: block; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .field-group { margin-bottom: 14px; }
    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .field-group input {
      width: 100%;
      border: 1.5px solid #e0dce5;
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
      color: var(--text);
    }
    .field-group input:focus {
      border-color: var(--wine);
      box-shadow: 0 0 0 3px rgba(107,45,62,0.1);
    }
    .field-group input.missing {
      border-color: #f5a0a0;
      background: #fff8f8;
    }
    .field-group input.missing::placeholder { color: #e0a0a0; }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, #e0dce5, transparent);
    }

    /* LOADING */
    .loading {
      display: none;
      align-items: center;
      gap: 10px;
      font-size: 13px;
      color: var(--text-muted);
      padding: 12px 0;
    }
    .loading.visible { display: flex; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2.5px solid #e0dce5;
      border-top-color: var(--wine);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ERROR */
    .error-msg {
      display: none;
      background: var(--red-light);
      border: 1px solid #fecaca;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: var(--red);
      margin-top: 12px;
      font-weight: 500;
    }
    .error-msg.visible { display: block; animation: slideDown 0.2s ease-out; }

    /* ORDERS LIST */
    .orders-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
    }

    .order-count {
      background: var(--wine);
      color: white;
      border-radius: 20px;
      padding: 3px 12px;
      font-size: 12px;
      font-weight: 700;
      min-width: 28px;
      text-align: center;
    }

    .orders-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.6;
    }
    .orders-empty .icon {
      font-size: 40px;
      margin-bottom: 12px;
      filter: grayscale(0.3);
    }

    .order-item {
      padding: 14px 16px;
      border: 1px solid #e8e5ed;
      border-radius: var(--radius);
      margin-bottom: 10px;
      background: var(--white);
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all var(--transition);
    }
    .order-item:hover {
      box-shadow: var(--shadow-sm);
      border-color: var(--wine-border);
    }

    .order-number {
      background: linear-gradient(135deg, var(--wine), var(--wine-light));
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .order-info { flex: 1; min-width: 0; }

    .order-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .order-detail {
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.5;
    }

    .order-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    /* STATES */
    .order-item.printed {
      background: var(--green-light);
      border-color: #bbf7d0;
    }
    .order-item.editing {
      background: var(--amber-light);
      border-color: #fcd34d;
      box-shadow: 0 0 0 2px rgba(245,158,11,0.15);
    }

    .printed-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
      margin-top: 3px;
    }

    .editing-badge {
      background: var(--amber);
      color: white;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    /* ACTION SECTION */
    .action-section {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #e8e5ed;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .action-group {
      display: flex;
      gap: 8px;
    }
    .action-group .btn { flex: 1; }

    .action-divider {
      height: 1px;
      background: #e8e5ed;
      margin: 6px 0;
    }

    .btn-archive {
      background: linear-gradient(135deg, var(--green), #15803d);
      color: white;
      border: none;
      border-radius: var(--radius-sm);
      padding: 12px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      width: 100%;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(22,163,74,0.2);
    }
    .btn-archive:hover {
      box-shadow: 0 4px 16px rgba(22,163,74,0.3);
      transform: translateY(-1px);
    }

    .btn-danger-outline {
      background: none;
      border: 1.5px solid #fecaca;
      color: var(--red);
      border-radius: var(--radius-sm);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      width: 100%;
      font-family: inherit;
    }
    .btn-danger-outline:hover { background: var(--red-light); }
    .btn-danger-outline:disabled { opacity: 0.35; cursor: not-allowed; }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 500;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { background: #15803d; }
    .toast.error { background: var(--red); }

    /* CONFIRM DIALOG */
    .confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(4px);
      z-index: 300;
      justify-content: center;
      align-items: center;
      animation: fadeIn 0.15s ease-out;
    }
    .confirm-overlay.visible { display: flex; }
    .confirm-box {
      background: white;
      border-radius: var(--radius);
      padding: 28px;
      width: 90%;
      max-width: 380px;
      box-shadow: var(--shadow-lg);
      text-align: center;
      animation: scaleIn 0.2s ease-out;
    }
    .confirm-box h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 8px;
    }
    .confirm-box p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .confirm-actions {
      display: flex;
      gap: 10px;
    }
    .confirm-actions .btn { flex: 1; padding: 10px 16px; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

<header>
  <div class="brand">Tropilla Vinos</div>
  <div class="right-section">
    <div class="date" id="today-date"></div>
    <a href="/historial.html" class="nav-link">Historial</a>
  </div>
</header>

<div class="container">

  <!-- COLUMNA IZQUIERDA: EXTRACCION -->
  <div>
    <div class="card">
      <div class="card-header">Nuevo pedido</div>
      <div class="card-body">
        <textarea
          id="msg-input"
          placeholder="Pega aca el mensaje de WhatsApp del cliente...&#10;&#10;Ejemplo: Hola! Me llamo Juan Perez, mi direccion es Av. Corrientes 1234 piso 3, Buenos Aires. Mi cel es 11-4567-8901."
        ></textarea>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          Extrayendo datos...
        </div>

        <div class="error-msg" id="error-msg"></div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="extractData()">
            Extraer datos
          </button>
          <button class="btn btn-secondary" onclick="showManualForm()">
            Ingresar manual
          </button>
          <button class="btn btn-secondary" onclick="clearAll()" title="Limpiar texto" style="flex:0.5">
            Limpiar
          </button>
        </div>

        <!-- FORM EXTRAIDO / MANUAL -->
        <div class="extracted-form" id="extracted-form">
          <div class="divider">Datos del pedido</div>

          <div class="field-group">
            <label>Nombre completo</label>
            <input type="text" id="f-nombre" placeholder="Nombre del destinatario">
          </div>
          <div class="field-group">
            <label>Direccion</label>
            <input type="text" id="f-direccion" placeholder="Calle, numero, piso/depto">
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
            <div class="field-group">
              <label>Ciudad</label>
              <input type="text" id="f-ciudad" placeholder="Localidad">
            </div>
            <div class="field-group">
              <label>Celular</label>
              <input type="tel" id="f-telefono" placeholder="11-xxxx-xxxx">
            </div>
          </div>
          <div class="field-group">
            <label>Fecha de salida</label>
            <input type="date" id="f-fecha">
          </div>

          <div class="btn-row">
            <button class="btn btn-success" onclick="addOrder()">
              + Agregar al listado
            </button>
            <button class="btn btn-secondary" onclick="clearForm()">
              Cancelar
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- COLUMNA DERECHA: LISTADO -->
  <div>
    <div class="card">
      <div class="card-header">
        <div class="orders-header">
          <span>Pedidos del dia</span>
          <span class="order-count" id="order-count">0</span>
        </div>
      </div>
      <div class="card-body">

        <div id="orders-list">
          <div class="orders-empty">
            <div class="icon">📦</div>
            Todavia no hay pedidos.<br>Pega un mensaje para empezar.
          </div>
        </div>

        <div class="action-section" id="action-section" style="display:none">
          <div class="action-group">
            <button class="btn btn-primary" onclick="printAllLabels()">
              Imprimir etiquetas
            </button>
            <button class="btn btn-secondary" onclick="exportWord()">
              Exportar Word
            </button>
          </div>
          <button class="btn btn-secondary btn-full" onclick="copyAll()">
            Copiar al portapapeles
          </button>

          <div class="action-divider"></div>

          <button class="btn-archive" id="btn-save-all" onclick="confirmarArchivo()">
            Guardar pedidos y limpiar pantalla
          </button>
          <button class="btn-danger-outline" id="btn-clear-printed" onclick="confirmarLimpieza()" disabled>
            Eliminar impresos (<span id="printed-count">0</span>)
          </button>
        </div>

      </div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- CONFIRMAR ARCHIVO -->
<div class="confirm-overlay" id="confirm-dialog">
  <div class="confirm-box">
    <h3 id="confirm-title">Confirmar</h3>
    <p id="confirm-msg">Mensaje</p>
    <div class="confirm-actions">
      <button class="btn btn-primary" id="confirm-ok" onclick="confirmAction()">Confirmar</button>
      <button class="btn btn-secondary" onclick="closeConfirm()">Cancelar</button>
    </div>
  </div>
</div>

<script>
  let orders = [];
  let editingIndex = null;
  let pendingConfirmAction = null;

  // Fecha de hoy
  const today = new Date();
  document.getElementById('today-date').textContent =
    today.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });

  function setDefaultFecha() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    document.getElementById('f-fecha').value = `${yyyy}-${mm}-${dd}`;
  }

  function formatFecha(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T12:00:00');
    const dia = d.toLocaleDateString('es-AR', { weekday: 'long' }).toUpperCase();
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${dd}/${mm} ${dia}`;
  }

  // Toast
  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = 'toast' + (type ? ' ' + type : '');
    toast.classList.add('visible');
    setTimeout(() => toast.classList.remove('visible'), 2800);
  }

  // Confirm dialog
  function showConfirm(title, msg, action) {
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-msg').textContent = msg;
    pendingConfirmAction = action;
    document.getElementById('confirm-dialog').classList.add('visible');
  }
  function closeConfirm() {
    document.getElementById('confirm-dialog').classList.remove('visible');
    pendingConfirmAction = null;
  }
  function confirmAction() {
    closeConfirm();
    if (pendingConfirmAction) pendingConfirmAction();
  }

  function confirmarArchivo() {
    showConfirm(
      'Guardar y limpiar',
      `Se van a guardar ${orders.length} pedido${orders.length !== 1 ? 's' : ''} y se va a limpiar la pantalla. Los pedidos quedan en el historial.`,
      archivarPedidos
    );
  }

  function confirmarLimpieza() {
    const count = orders.filter(o => o.printed).length;
    showConfirm(
      'Eliminar impresos',
      `Se van a eliminar ${count} pedido${count !== 1 ? 's' : ''} ya impresos. Esta accion no se puede deshacer.`,
      clearPrinted
    );
  }

  async function extractData() {
    const msg = document.getElementById('msg-input').value.trim();
    if (!msg) return;

    setLoading(true);
    hideError();

    try {
      const res = await fetch('/api/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || 'Error del servidor');

      fillForm(json.data);
      showForm();
    } catch (err) {
      showError(err.message || 'No se pudo procesar el mensaje.');
    } finally {
      setLoading(false);
    }
  }

  function fillForm(data) {
    const fields = ['nombre', 'direccion', 'ciudad', 'telefono'];
    fields.forEach(f => {
      const el = document.getElementById('f-' + f);
      el.value = data[f] || '';
      if (!data[f]) {
        el.classList.add('missing');
      } else {
        el.classList.remove('missing');
      }
    });
    setDefaultFecha();
  }

  function showManualForm() {
    editingIndex = null;
    fillForm({ nombre: null, direccion: null, ciudad: null, telefono: null });
    showForm();
    updateFormButtons();
    document.getElementById('f-nombre').focus();
  }

  function showForm() {
    document.getElementById('extracted-form').classList.add('visible');
  }

  function clearAll() {
    document.getElementById('msg-input').value = '';
    document.getElementById('extracted-form').classList.remove('visible');
    ['nombre', 'direccion', 'ciudad', 'telefono'].forEach(f => {
      const el = document.getElementById('f-' + f);
      el.value = '';
      el.classList.remove('missing');
    });
    document.getElementById('f-fecha').value = '';
    hideError();
  }

  function clearForm() {
    document.getElementById('msg-input').value = '';
    document.getElementById('extracted-form').classList.remove('visible');
    ['nombre', 'direccion', 'ciudad', 'telefono'].forEach(f => {
      const el = document.getElementById('f-' + f);
      el.value = '';
      el.classList.remove('missing');
    });
    document.getElementById('f-fecha').value = '';
    editingIndex = null;
    updateFormButtons();
    hideError();
  }

  async function addOrder() {
    const nombre = document.getElementById('f-nombre').value.trim();
    const direccion = document.getElementById('f-direccion').value.trim();
    const ciudad = document.getElementById('f-ciudad').value.trim();
    const telefono = document.getElementById('f-telefono').value.trim();
    const fecha = document.getElementById('f-fecha').value;

    if (!nombre) {
      document.getElementById('f-nombre').focus();
      document.getElementById('f-nombre').classList.add('missing');
      return;
    }

    const order = { nombre, direccion, ciudad, telefono, fecha };

    if (editingIndex !== null) {
      const existing = orders[editingIndex];
      order.id = existing.id;
      order.printed = existing.printed;

      if (order.id) {
        try {
          const res = await fetch(`/api/orders/${order.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(order)
          });
          const json = await res.json();
          if (!json.success) console.warn('Error al actualizar:', json.error);
        } catch (e) {
          console.warn('No se pudo actualizar en la base de datos:', e.message);
        }
      }

      orders[editingIndex] = order;
      editingIndex = null;
      renderOrders();
      clearForm();
      showToast('Pedido actualizado', 'success');
      return;
    }

    try {
      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
      });
      const json = await res.json();
      if (json.success) order.id = json.data.id;
    } catch (e) {
      console.warn('No se pudo guardar en la base de datos:', e.message);
    }

    orders.push(order);
    renderOrders();
    clearForm();
    showToast('Pedido agregado', 'success');
  }

  function editOrder(index) {
    const o = orders[index];
    editingIndex = index;

    document.getElementById('f-nombre').value = o.nombre || '';
    document.getElementById('f-direccion').value = o.direccion || '';
    document.getElementById('f-ciudad').value = o.ciudad || '';
    document.getElementById('f-telefono').value = o.telefono || '';
    document.getElementById('f-fecha').value = o.fecha || '';

    ['nombre', 'direccion', 'ciudad', 'telefono'].forEach(f => {
      document.getElementById('f-' + f).classList.remove('missing');
    });

    showForm();
    updateFormButtons();
    document.getElementById('f-nombre').focus();
    renderOrders();
  }

  function cancelEdit() {
    editingIndex = null;
    clearForm();
    renderOrders();
  }

  function updateFormButtons() {
    const btnRow = document.querySelector('.extracted-form .btn-row');
    if (editingIndex !== null) {
      btnRow.innerHTML = `
        <button class="btn btn-success" onclick="addOrder()">
          Guardar cambios
        </button>
        <button class="btn btn-secondary" onclick="cancelEdit()">
          Cancelar
        </button>
      `;
    } else {
      btnRow.innerHTML = `
        <button class="btn btn-success" onclick="addOrder()">
          + Agregar al listado
        </button>
        <button class="btn btn-secondary" onclick="clearForm()">
          Cancelar
        </button>
      `;
    }
  }

  async function archivarPedidos() {
    const ids = orders.filter(o => o.id).map(o => o.id);
    if (ids.length === 0) return;

    try {
      const res = await fetch('/api/orders/archivar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids })
      });
      const json = await res.json();
      if (json.success) {
        const count = orders.length;
        orders = [];
        editingIndex = null;
        renderOrders();
        clearForm();
        showToast(`${count} pedido${count !== 1 ? 's' : ''} guardado${count !== 1 ? 's' : ''}`, 'success');
      }
    } catch (e) {
      showToast('Error al guardar los pedidos', 'error');
    }
  }

  async function removeOrder(index) {
    const order = orders[index];
    if (order.id) {
      try {
        await fetch(`/api/orders/${order.id}`, { method: 'DELETE' });
      } catch (e) {
        console.warn('No se pudo eliminar de la base de datos:', e.message);
      }
    }
    if (editingIndex === index) {
      editingIndex = null;
      clearForm();
    } else if (editingIndex !== null && editingIndex > index) {
      editingIndex--;
    }
    orders.splice(index, 1);
    renderOrders();
  }

  async function loadTodayOrders() {
    try {
      const res = await fetch('/api/orders');
      const json = await res.json();
      if (json.success && json.data.length > 0) {
        orders = json.data.map(o => ({
          id: o.id,
          nombre: o.nombre || '',
          direccion: o.direccion || '',
          ciudad: o.ciudad || '',
          telefono: o.telefono || '',
          fecha: o.fecha_salida || '',
        }));
        renderOrders();
      }
    } catch (e) {
      console.warn('No se pudo cargar pedidos del dia:', e.message);
    }
  }

  function renderOrders() {
    const list = document.getElementById('orders-list');
    const actionSection = document.getElementById('action-section');
    const count = document.getElementById('order-count');

    count.textContent = orders.length;

    if (orders.length === 0) {
      list.innerHTML = `
        <div class="orders-empty">
          <div class="icon">📦</div>
          Todavia no hay pedidos.<br>Pega un mensaje para empezar.
        </div>`;
      actionSection.style.display = 'none';
      return;
    }

    actionSection.style.display = 'flex';

    list.innerHTML = orders.map((o, i) => `
      <div class="order-item${o.printed ? ' printed' : ''}${editingIndex === i ? ' editing' : ''}">
        <div class="order-number">${i + 1}</div>
        <div class="order-info">
          <div class="order-name">
            ${escHtml(o.nombre) || '—'}
            ${editingIndex === i ? '<span class="editing-badge">Editando</span>' : ''}
          </div>
          ${o.direccion ? `<div class="order-detail">📍 ${escHtml(o.direccion)}</div>` : ''}
          ${o.fecha ? `<div class="order-detail">📅 Sale ${formatFecha(o.fecha)}</div>` : ''}
          ${o.ciudad ? `<div class="order-detail">🏙️ ${escHtml(o.ciudad)}</div>` : ''}
          ${o.telefono ? `<div class="order-detail">📱 ${escHtml(o.telefono)}</div>` : ''}
          ${o.printed ? '<div class="printed-badge">✓ Impreso</div>' : ''}
        </div>
        <div class="order-actions">
          <button class="btn-icon" onclick="editOrder(${i})">✏️ Editar</button>
          <button class="btn-icon" onclick="printLabel(${i})">🖨️ Etiqueta</button>
          <button class="btn-icon-delete" onclick="removeOrder(${i})" title="Eliminar">✕</button>
        </div>
      </div>
    `).join('');

    const printedCount = orders.filter(o => o.printed).length;
    document.getElementById('printed-count').textContent = printedCount;
    document.getElementById('btn-clear-printed').disabled = printedCount === 0;
  }

  /* -- IMPRESION DE ETIQUETAS -- */

  function labelHTML(o) {
    const fechaStr = o.fecha ? formatFecha(o.fecha) : null;
    return `
      <div class="label">
        <p class="label-header">DESTINATARIO</p>
        <p class="label-name">${escHtml(o.nombre) || '—'}</p>
        <div class="label-address-block">
          ${o.direccion ? `<p class="label-underline">Direccion: ${escHtml(o.direccion)}</p>` : ''}
          ${fechaStr ? `<p class="label-underline">SALE ${fechaStr}</p>` : ''}
        </div>
        ${o.ciudad ? `<p class="label-city">${escHtml(o.ciudad)}</p>` : ''}
        ${o.telefono ? `<p class="label-phone">Celular: ${escHtml(o.telefono)}</p>` : ''}
      </div>
    `;
  }

  function printLabel(index) {
    const o = orders[index];
    if (!o) return;
    openPrintWindow([o]);
    orders[index].printed = true;
    renderOrders();
  }

  function printAllLabels() {
    if (orders.length === 0) return;
    openPrintWindow(orders);
    orders.forEach(o => o.printed = true);
    renderOrders();
  }

  async function clearPrinted() {
    const printed = orders.filter(o => o.printed);
    if (printed.length === 0) return;

    for (const o of printed) {
      if (o.id) {
        try {
          await fetch(`/api/orders/${o.id}`, { method: 'DELETE' });
        } catch (e) {
          console.warn('No se pudo eliminar de la base de datos:', e.message);
        }
      }
    }

    const count = printed.length;
    orders = orders.filter(o => !o.printed);
    renderOrders();
    showToast(`${count} pedido${count !== 1 ? 's' : ''} eliminado${count !== 1 ? 's' : ''}`, 'success');
  }

  function openPrintWindow(orderList) {
    const pages = [];
    for (let i = 0; i < orderList.length; i += 3) {
      pages.push(orderList.slice(i, i + 3));
    }

    const pagesHTML = pages.map((pageOrders, pi) => `
      <div class="page${pi === pages.length - 1 ? ' last-page' : ''}${pageOrders.length < 3 ? ' partial-page' : ''}">
        ${pageOrders.map(o => labelHTML(o)).join('')}
      </div>
    `).join('');

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Etiquetas Tropilla</title>
  <style>
    @page { size: A4 portrait; margin: 12mm 10mm; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: white; font-family: Arial, Helvetica, sans-serif; }
    .page {
      display: flex; flex-direction: column;
      height: 273mm; gap: 3mm; page-break-after: always;
    }
    .page.last-page { page-break-after: avoid; }
    .page.partial-page { height: auto; }
    .label {
      border: 1.5px solid #000; padding: 10px 30px; text-align: center;
      display: flex; flex-direction: column; justify-content: center; gap: 8px;
    }
    .page:not(.partial-page) .label { flex: 1; }
    .page.partial-page .label { padding: 20px 30px; }
    .label-header { font-size: 11pt; font-weight: bold; letter-spacing: 2px; }
    .label-name { font-size: 16pt; font-weight: bold; }
    .label-address-block { line-height: 1.8; }
    .label-underline { font-size: 11pt; font-weight: bold; text-decoration: underline; }
    .label-city { font-size: 13pt; font-weight: bold; text-decoration: underline; }
    .label-phone { font-size: 11pt; font-weight: bold; }
    @media screen {
      body { padding: 20px; background: #eee; }
      .page {
        background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        margin: 0 auto 20px; width: 190mm; height: 273mm; padding: 4mm;
      }
      .page.partial-page { height: auto; }
    }
  </style>
</head>
<body>
  ${pagesHTML}
  <script>window.onload = function() { window.print(); }<\/script>
</body>
</html>`);
    win.document.close();
  }

  /* -- COPIAR / EXPORTAR -- */

  function copyAll() {
    if (orders.length === 0) return;

    const dateStr = today.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const lines = [`PEDIDOS TROPILLA VINOS — ${dateStr}`, ''];

    orders.forEach((o, i) => {
      lines.push(`#${i + 1} | ${o.nombre || '—'}`);
      if (o.direccion) lines.push(`   Direccion: ${o.direccion}`);
      if (o.fecha) lines.push(`   Sale: ${formatFecha(o.fecha)}`);
      if (o.ciudad) lines.push(`   Ciudad: ${o.ciudad}`);
      if (o.telefono) lines.push(`   Celular: ${o.telefono}`);
      if (i < orders.length - 1) lines.push('');
    });

    lines.push('');
    lines.push(`Total: ${orders.length} pedido${orders.length !== 1 ? 's' : ''}`);

    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      showToast('Copiado al portapapeles', 'success');
    });
  }

  function setLoading(val) {
    const btn = document.querySelector('.btn-primary');
    const loading = document.getElementById('loading');
    if (val) {
      loading.classList.add('visible');
      btn.disabled = true;
    } else {
      loading.classList.remove('visible');
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function exportWord() {
    if (orders.length === 0) return;

    const dateStr = today.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });

    const rows = orders.map((o, i) => `
      <tr>
        <td style="width:30px;text-align:center;font-weight:bold;color:#6b2d3e;vertical-align:top;padding:8px 10px;">${i + 1}</td>
        <td style="padding:8px 10px;vertical-align:top;">
          <b style="font-size:13pt;">${escHtml(o.nombre) || '—'}</b><br>
          ${o.direccion ? `<span style="color:#555;">📍 ${escHtml(o.direccion)}</span><br>` : ''}
          ${o.fecha ? `<span style="color:#555;">📅 Sale ${formatFecha(o.fecha)}</span><br>` : ''}
          ${o.ciudad ? `<span style="color:#555;">🏙️ ${escHtml(o.ciudad)}</span><br>` : ''}
          ${o.telefono ? `<span style="color:#555;">📱 ${escHtml(o.telefono)}</span>` : ''}
        </td>
      </tr>
      <tr><td colspan="2" style="border-bottom:1px solid #e8d5d8;padding:0;"></td></tr>
    `).join('');

    const html = `
      <html xmlns:o="urn:schemas-microsoft-com:office:office"
            xmlns:w="urn:schemas-microsoft-com:office:word"
            xmlns="http://www.w3.org/TR/REC-html40">
      <head>
        <meta charset="UTF-8">
        <title>Pedidos Tropilla Vinos</title>
        <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->
        <style>
          body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; color: #1a1a1a; margin: 2cm; }
          h1 { font-size: 18pt; color: #6b2d3e; margin-bottom: 4px; }
          .subtitle { font-size: 10pt; color: #888; margin-bottom: 24px; }
          table { width: 100%; border-collapse: collapse; margin-top: 12px; }
          td { vertical-align: top; }
          .footer { margin-top: 32px; font-size: 9pt; color: #aaa; border-top: 1px solid #e0d0d2; padding-top: 10px; }
        </style>
      </head>
      <body>
        <h1>Tropilla Vinos — Pedidos del Dia</h1>
        <div class="subtitle">${dateStr} &nbsp;|&nbsp; ${orders.length} pedido${orders.length !== 1 ? 's' : ''}</div>
        <table>
          <tbody>${rows}</tbody>
        </table>
        <div class="footer">Generado por Tropilla Pedidos App</div>
      </body>
      </html>
    `;

    const blob = new Blob(['\ufeff' + html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pedidos-tropilla-${today.toISOString().slice(0,10)}.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('Archivo Word descargado', 'success');
  }

  // Ctrl+Enter para extraer
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) extractData();
  });

  loadTodayOrders();
</script>

</body>
</html>
