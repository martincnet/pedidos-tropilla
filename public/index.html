<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tropilla — Pedidos del Día</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --wine: #6b2d3e;
      --wine-light: #9b4d5e;
      --wine-pale: #fdf0f2;
      --wine-border: #e8d5d8;
      --text: #1a1a1a;
      --text-muted: #777;
      --white: #fff;
      --gray-bg: #f7f7f7;
      --green: #27ae60;
      --red: #e74c3c;
      --radius: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--gray-bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: var(--wine);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    header .brand { font-size: 18px; font-weight: 600; letter-spacing: 0.5px; }
    header .date { font-size: 13px; opacity: 0.8; }

    /* LAYOUT */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      align-items: start;
    }

    @media (max-width: 768px) {
      .container { grid-template-columns: 1fr; padding: 16px 12px; }
    }

    /* CARD */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--wine-border);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--wine);
    }

    .card-body { padding: 20px; }

    /* TEXTAREA */
    textarea {
      width: 100%;
      min-height: 140px;
      border: 1.5px solid var(--wine-border);
      border-radius: var(--radius);
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      color: var(--text);
      background: var(--white);
    }

    textarea:focus { border-color: var(--wine); }
    textarea::placeholder { color: #bbb; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
      text-align: center;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: var(--wine); color: white; }
    .btn-primary:hover:not(:disabled) { background: var(--wine-light); }

    .btn-secondary { background: var(--wine-pale); color: var(--wine); border: 1.5px solid var(--wine-border); }
    .btn-secondary:hover:not(:disabled) { background: var(--wine-border); }

    .btn-success { background: var(--green); color: white; }
    .btn-success:hover:not(:disabled) { opacity: 0.85; }

    .btn-danger-sm {
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      line-height: 1;
      transition: color 0.15s;
    }
    .btn-danger-sm:hover { color: var(--red); }

    .btn-full { width: 100%; }

    .btn-print {
      background: none;
      border: 1.5px solid var(--wine-border);
      color: var(--wine);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-print:hover { background: var(--wine-pale); }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .btn-row .btn { flex: 1; }

    /* EXTRACTED FORM */
    .extracted-form { margin-top: 16px; display: none; }
    .extracted-form.visible { display: block; }

    .field-group { margin-bottom: 12px; }

    .field-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--wine);
      margin-bottom: 4px;
    }

    .field-group input {
      width: 100%;
      border: 1.5px solid var(--wine-border);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-group input:focus { border-color: var(--wine); }

    .field-group input.missing {
      border-color: #f0c0c0;
      background: #fff8f8;
    }

    .field-group input.missing::placeholder { color: #e0a0a0; }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
      color: var(--text-muted);
      font-size: 12px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--wine-border);
    }

    /* LOADING */
    .loading {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
      padding: 8px 0;
    }

    .loading.visible { display: flex; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--wine-border);
      border-top-color: var(--wine);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ERROR */
    .error-msg {
      display: none;
      background: #fff0f0;
      border: 1px solid #f5c0c0;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--red);
      margin-top: 10px;
    }

    .error-msg.visible { display: block; }

    /* ORDERS LIST */
    .orders-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .order-count {
      background: var(--wine);
      color: white;
      border-radius: 20px;
      padding: 2px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .orders-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .orders-empty .icon { font-size: 32px; margin-bottom: 8px; }

    .order-item {
      padding: 14px;
      border: 1px solid var(--wine-border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      background: var(--wine-pale);
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .order-number {
      background: var(--wine);
      color: white;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .order-info { flex: 1; min-width: 0; }

    .order-name {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 3px;
    }

    .order-detail {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .order-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
      flex-shrink: 0;
    }

    /* COPY SECTION */
    .copy-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--wine-border);
    }

    .copy-success {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--green);
      margin-top: 8px;
      justify-content: center;
    }

    .copy-success.visible { display: flex; }

    .order-item.printed {
      background: #f0f9f4;
      border-color: #b2dfc4;
    }

    .order-item.editing {
      background: #fff8e1;
      border-color: #f0c040;
      box-shadow: 0 0 0 2px rgba(240,192,64,0.3);
    }

    .printed-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 11px;
      color: var(--green);
      font-weight: 600;
      margin-top: 3px;
    }

    .btn-danger {
      background: none;
      border: 1.5px solid #f5c0c0;
      color: var(--red);
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
      margin-top: 8px;
    }
    .btn-danger:hover { background: #fff0f0; }
    .btn-danger:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-edit {
      background: none;
      border: 1.5px solid var(--wine-border);
      color: var(--wine);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-edit:hover { background: var(--wine-pale); }

    .btn-save-all {
      background: var(--green);
      color: white;
      border: none;
      border-radius: var(--radius);
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      width: 100%;
      margin-top: 8px;
    }
    .btn-save-all:hover { opacity: 0.85; }
    .btn-save-all:disabled { opacity: 0.4; cursor: not-allowed; }

    .editing-badge {
      background: var(--wine);
      color: white;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <div class="brand">Tropilla Vinos — Pedidos</div>
  <div style="display:flex;align-items:center;gap:16px;">
    <div class="date" id="today-date"></div>
    <a href="/historial.html" style="color:rgba(255,255,255,0.8);font-size:13px;text-decoration:none;border:1px solid rgba(255,255,255,0.3);padding:4px 12px;border-radius:6px;">Historial</a>
  </div>
</header>

<div class="container">

  <!-- COLUMNA IZQUIERDA: EXTRACCION -->
  <div>
    <div class="card">
      <div class="card-header">Pegar mensaje de WhatsApp</div>
      <div class="card-body">
        <textarea
          id="msg-input"
          placeholder="Pega acá el mensaje del cliente. Por ejemplo:&#10;&#10;Hola! Me llamo Juan Pérez, quiero pedir 2 botellas del Malbec. Mi dirección es Av. Corrientes 1234 piso 3, Buenos Aires. Mi cel es 11-4567-8901."
        ></textarea>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          Extrayendo datos...
        </div>

        <div class="error-msg" id="error-msg"></div>

        <div class="btn-row">
          <button class="btn btn-primary" onclick="extractData()">
            Extraer datos
          </button>
          <button class="btn btn-secondary" onclick="showManualForm()">
            Ingresar manual
          </button>
          <button class="btn btn-secondary" onclick="clearAll()" title="Limpiar texto">
            ✕ Limpiar
          </button>
        </div>

        <!-- FORM EXTRAIDO / MANUAL -->
        <div class="extracted-form" id="extracted-form">
          <div class="divider">Datos del pedido</div>

          <div class="field-group">
            <label>Nombre completo</label>
            <input type="text" id="f-nombre" placeholder="Sin datos">
          </div>
          <div class="field-group">
            <label>Dirección</label>
            <input type="text" id="f-direccion" placeholder="Sin datos">
          </div>
          <div class="field-group">
            <label>Ciudad</label>
            <input type="text" id="f-ciudad" placeholder="Sin datos">
          </div>
          <div class="field-group">
            <label>Celular</label>
            <input type="tel" id="f-telefono" placeholder="Sin datos">
          </div>
          <div class="field-group">
            <label>Fecha de salida</label>
            <input type="date" id="f-fecha">
          </div>

          <div class="btn-row">
            <button class="btn btn-success" onclick="addOrder()">
              + Agregar al listado
            </button>
            <button class="btn btn-secondary" onclick="clearForm()">
              Limpiar
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- COLUMNA DERECHA: LISTADO -->
  <div>
    <div class="card">
      <div class="card-header">
        <div class="orders-header">
          <span>Pedidos del día</span>
          <span class="order-count" id="order-count">0</span>
        </div>
      </div>
      <div class="card-body">

        <div id="orders-list">
          <div class="orders-empty">
            <div class="icon">📦</div>
            Todavía no hay pedidos.<br>Pegá un mensaje para empezar.
          </div>
        </div>

        <div class="copy-section" id="copy-section" style="display:none">
          <button class="btn btn-primary btn-full" onclick="printAllLabels()">
            🖨️ Imprimir todas las etiquetas
          </button>
          <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="copyAll()">
            Copiar todos los pedidos
          </button>
          <button class="btn btn-secondary btn-full" style="margin-top:8px" onclick="exportWord()">
            Exportar a Word (.doc)
          </button>
          <button class="btn-save-all" id="btn-save-all" onclick="archivarPedidos()">
            💾 Guardar pedidos y limpiar pantalla
          </button>
          <button class="btn-danger" id="btn-clear-printed" onclick="clearPrinted()" disabled>
            🗑️ Eliminar pedidos impresos (<span id="printed-count">0</span>)
          </button>
          <div class="copy-success" id="copy-success">
            ✓ Copiado al portapapeles
          </div>
        </div>

      </div>
    </div>
  </div>

</div>

<script>
  let orders = [];
  let editingIndex = null; // índice del pedido que se está editando

  // Fecha de hoy
  const today = new Date();
  document.getElementById('today-date').textContent =
    today.toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' });

  // Precargar fecha de hoy en el campo fecha
  function setDefaultFecha() {
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    document.getElementById('f-fecha').value = `${yyyy}-${mm}-${dd}`;
  }

  function formatFecha(dateStr) {
    if (!dateStr) return null;
    const d = new Date(dateStr + 'T12:00:00');
    const dia = d.toLocaleDateString('es-AR', { weekday: 'long' }).toUpperCase();
    const dd = String(d.getDate()).padStart(2, '0');
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    return `${dd}/${mm} ${dia}`;
  }

  async function extractData() {
    const msg = document.getElementById('msg-input').value.trim();
    if (!msg) return;

    setLoading(true);
    hideError();

    try {
      const res = await fetch('/api/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });

      const json = await res.json();

      if (!res.ok) throw new Error(json.error || 'Error del servidor');

      fillForm(json.data);
      showForm();

    } catch (err) {
      showError(err.message || 'No se pudo procesar el mensaje.');
    } finally {
      setLoading(false);
    }
  }

  function fillForm(data) {
    const fields = ['nombre', 'direccion', 'ciudad', 'telefono'];
    fields.forEach(f => {
      const el = document.getElementById('f-' + f);
      el.value = data[f] || '';
      if (!data[f]) {
        el.classList.add('missing');
      } else {
        el.classList.remove('missing');
      }
    });
    setDefaultFecha();
  }

  function showManualForm() {
    editingIndex = null;
    fillForm({ nombre: null, direccion: null, ciudad: null, telefono: null });
    showForm();
    updateFormButtons();
    document.getElementById('f-nombre').focus();
  }

  function showForm() {
    document.getElementById('extracted-form').classList.add('visible');
  }

  function clearAll() {
    document.getElementById('msg-input').value = '';
    document.getElementById('extracted-form').classList.remove('visible');
    ['nombre', 'direccion', 'ciudad', 'telefono'].forEach(f => {
      const el = document.getElementById('f-' + f);
      el.value = '';
      el.classList.remove('missing');
    });
    document.getElementById('f-fecha').value = '';
    hideError();
  }

  function clearForm() {
    document.getElementById('msg-input').value = '';
    document.getElementById('extracted-form').classList.remove('visible');
    ['nombre', 'direccion', 'ciudad', 'telefono'].forEach(f => {
      const el = document.getElementById('f-' + f);
      el.value = '';
      el.classList.remove('missing');
    });
    document.getElementById('f-fecha').value = '';
    editingIndex = null;
    updateFormButtons();
    hideError();
  }

  async function addOrder() {
    const nombre = document.getElementById('f-nombre').value.trim();
    const direccion = document.getElementById('f-direccion').value.trim();
    const ciudad = document.getElementById('f-ciudad').value.trim();
    const telefono = document.getElementById('f-telefono').value.trim();
    const fecha = document.getElementById('f-fecha').value;

    if (!nombre) {
      document.getElementById('f-nombre').focus();
      document.getElementById('f-nombre').classList.add('missing');
      return;
    }

    const order = { nombre, direccion, ciudad, telefono, fecha };

    // Modo edición: actualizar pedido existente
    if (editingIndex !== null) {
      const existing = orders[editingIndex];
      order.id = existing.id;
      order.printed = existing.printed;

      if (order.id) {
        try {
          const res = await fetch(`/api/orders/${order.id}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(order)
          });
          const json = await res.json();
          if (!json.success) console.warn('Error al actualizar:', json.error);
        } catch (e) {
          console.warn('No se pudo actualizar en la base de datos:', e.message);
        }
      }

      orders[editingIndex] = order;
      editingIndex = null;
      renderOrders();
      clearForm();
      return;
    }

    // Modo agregar: crear pedido nuevo
    try {
      const res = await fetch('/api/orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(order)
      });
      const json = await res.json();
      if (json.success) order.id = json.data.id;
    } catch (e) {
      console.warn('No se pudo guardar en la base de datos:', e.message);
    }

    orders.push(order);
    renderOrders();
    clearForm();
  }

  function editOrder(index) {
    const o = orders[index];
    editingIndex = index;

    document.getElementById('f-nombre').value = o.nombre || '';
    document.getElementById('f-direccion').value = o.direccion || '';
    document.getElementById('f-ciudad').value = o.ciudad || '';
    document.getElementById('f-telefono').value = o.telefono || '';
    document.getElementById('f-fecha').value = o.fecha || '';

    ['nombre', 'direccion', 'ciudad', 'telefono'].forEach(f => {
      document.getElementById('f-' + f).classList.remove('missing');
    });

    showForm();
    updateFormButtons();
    document.getElementById('f-nombre').focus();
    renderOrders();
  }

  function cancelEdit() {
    editingIndex = null;
    clearForm();
    renderOrders();
  }

  function updateFormButtons() {
    const btnRow = document.querySelector('.extracted-form .btn-row');
    if (editingIndex !== null) {
      btnRow.innerHTML = `
        <button class="btn btn-success" onclick="addOrder()">
          ✓ Guardar cambios
        </button>
        <button class="btn btn-secondary" onclick="cancelEdit()">
          Cancelar
        </button>
      `;
    } else {
      btnRow.innerHTML = `
        <button class="btn btn-success" onclick="addOrder()">
          + Agregar al listado
        </button>
        <button class="btn btn-secondary" onclick="clearForm()">
          Limpiar
        </button>
      `;
    }
  }

  async function archivarPedidos() {
    const ids = orders.filter(o => o.id).map(o => o.id);
    if (ids.length === 0) return;

    try {
      const res = await fetch('/api/orders/archivar', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ids })
      });
      const json = await res.json();
      if (json.success) {
        orders = [];
        editingIndex = null;
        renderOrders();
        clearForm();
      }
    } catch (e) {
      console.warn('No se pudo archivar los pedidos:', e.message);
    }
  }

  async function removeOrder(index) {
    const order = orders[index];
    if (order.id) {
      try {
        await fetch(`/api/orders/${order.id}`, { method: 'DELETE' });
      } catch (e) {
        console.warn('No se pudo eliminar de la base de datos:', e.message);
      }
    }
    orders.splice(index, 1);
    renderOrders();
  }

  // Cargar pedidos del día al iniciar
  async function loadTodayOrders() {
    try {
      const res = await fetch('/api/orders');
      const json = await res.json();
      if (json.success && json.data.length > 0) {
        orders = json.data.map(o => ({
          id: o.id,
          nombre: o.nombre || '',
          direccion: o.direccion || '',
          ciudad: o.ciudad || '',
          telefono: o.telefono || '',
          fecha: o.fecha_salida || '',
        }));
        renderOrders();
      }
    } catch (e) {
      console.warn('No se pudo cargar pedidos del día:', e.message);
    }
  }

  function renderOrders() {
    const list = document.getElementById('orders-list');
    const copySection = document.getElementById('copy-section');
    const count = document.getElementById('order-count');

    count.textContent = orders.length;

    if (orders.length === 0) {
      list.innerHTML = `
        <div class="orders-empty">
          <div class="icon">📦</div>
          Todavía no hay pedidos.<br>Pegá un mensaje para empezar.
        </div>`;
      copySection.style.display = 'none';
      return;
    }

    copySection.style.display = 'block';
    document.getElementById('copy-success').classList.remove('visible');

    list.innerHTML = orders.map((o, i) => `
      <div class="order-item${o.printed ? ' printed' : ''}${editingIndex === i ? ' editing' : ''}">
        <div class="order-number">${i + 1}</div>
        <div class="order-info">
          <div class="order-name">
            ${escHtml(o.nombre) || '—'}
            ${editingIndex === i ? ' <span class="editing-badge">Editando</span>' : ''}
          </div>
          ${o.direccion ? `<div class="order-detail">📍 ${escHtml(o.direccion)}</div>` : ''}
          ${o.fecha ? `<div class="order-detail">📅 Sale ${formatFecha(o.fecha)}</div>` : ''}
          ${o.ciudad ? `<div class="order-detail">🏙️ ${escHtml(o.ciudad)}</div>` : ''}
          ${o.telefono ? `<div class="order-detail">📱 ${escHtml(o.telefono)}</div>` : ''}
          ${o.printed ? `<div class="printed-badge">✓ Impreso</div>` : ''}
        </div>
        <div class="order-actions">
          <button class="btn-edit" onclick="editOrder(${i})">✏️ Editar</button>
          <button class="btn-print" onclick="printLabel(${i})">🖨️ Etiqueta</button>
          <button class="btn-danger-sm" onclick="removeOrder(${i})" title="Eliminar">✕</button>
        </div>
      </div>
    `).join('');

    // Actualizar botón limpiar impresos
    const printedCount = orders.filter(o => o.printed).length;
    document.getElementById('printed-count').textContent = printedCount;
    document.getElementById('btn-clear-printed').disabled = printedCount === 0;
  }

  /* ── IMPRESIÓN DE ETIQUETAS ─────────────────────────────── */

  function labelHTML(o) {
    const fechaStr = o.fecha ? formatFecha(o.fecha) : null;
    return `
      <div class="label">
        <p class="label-header">DESTINATARIO</p>
        <p class="label-name">${escHtml(o.nombre) || '—'}</p>
        <div class="label-address-block">
          ${o.direccion ? `<p class="label-underline">Dirección: ${escHtml(o.direccion)}</p>` : ''}
          ${fechaStr ? `<p class="label-underline">SALE ${fechaStr}</p>` : ''}
        </div>
        ${o.ciudad ? `<p class="label-city">${escHtml(o.ciudad)}</p>` : ''}
        ${o.telefono ? `<p class="label-phone">Celular: ${escHtml(o.telefono)}</p>` : ''}
      </div>
    `;
  }

  function printLabel(index) {
    const o = orders[index];
    if (!o) return;
    openPrintWindow([o]);
    orders[index].printed = true;
    renderOrders();
  }

  function printAllLabels() {
    if (orders.length === 0) return;
    openPrintWindow(orders);
    orders.forEach(o => o.printed = true);
    renderOrders();
  }

  async function clearPrinted() {
    const printed = orders.filter(o => o.printed);
    if (printed.length === 0) return;

    for (const o of printed) {
      if (o.id) {
        try {
          await fetch(`/api/orders/${o.id}`, { method: 'DELETE' });
        } catch (e) {
          console.warn('No se pudo eliminar de la base de datos:', e.message);
        }
      }
    }

    orders = orders.filter(o => !o.printed);
    renderOrders();
  }

  function openPrintWindow(orderList) {
    // Agrupar en páginas de 3
    const pages = [];
    for (let i = 0; i < orderList.length; i += 3) {
      pages.push(orderList.slice(i, i + 3));
    }

    const pagesHTML = pages.map((pageOrders, pi) => `
      <div class="page${pi === pages.length - 1 ? ' last-page' : ''}${pageOrders.length < 3 ? ' partial-page' : ''}">
        ${pageOrders.map(o => labelHTML(o)).join('')}
      </div>
    `).join('');

    const win = window.open('', '_blank');
    win.document.write(`<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Etiquetas Tropilla</title>
  <style>
    @page { size: A4 portrait; margin: 12mm 10mm; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: white;
      font-family: Arial, Helvetica, sans-serif;
    }
    .page {
      display: flex;
      flex-direction: column;
      height: 273mm; /* 297mm - 2×12mm márgenes @page */
      gap: 3mm;
      page-break-after: always;
    }
    .page.last-page { page-break-after: avoid; }
    .page.partial-page { height: auto; }
    .label {
      border: 1.5px solid #000;
      padding: 10px 30px;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }
    .page:not(.partial-page) .label { flex: 1; }
    .page.partial-page .label { padding: 20px 30px; }
    .label-header {
      font-size: 11pt;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .label-name {
      font-size: 16pt;
      font-weight: bold;
    }
    .label-address-block { line-height: 1.8; }
    .label-underline {
      font-size: 11pt;
      font-weight: bold;
      text-decoration: underline;
    }
    .label-city {
      font-size: 13pt;
      font-weight: bold;
      text-decoration: underline;
    }
    .label-phone {
      font-size: 11pt;
      font-weight: bold;
    }
    @media screen {
      body { padding: 20px; background: #eee; }
      .page {
        background: white;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        margin: 0 auto 20px;
        width: 190mm;
        height: 273mm;
        padding: 4mm;
      }
      .page.partial-page {
        height: auto;
      }
    }
  </style>
</head>
<body>
  ${pagesHTML}
  <script>window.onload = function() { window.print(); }<\/script>
</body>
</html>`);
    win.document.close();
  }

  /* ── COPIAR / EXPORTAR ──────────────────────────────────── */

  function copyAll() {
    if (orders.length === 0) return;

    const dateStr = today.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
    const lines = [`PEDIDOS TROPILLA VINOS — ${dateStr}`, ''];

    orders.forEach((o, i) => {
      lines.push(`#${i + 1} | ${o.nombre || '—'}`);
      if (o.direccion) lines.push(`   Dirección: ${o.direccion}`);
      if (o.fecha) lines.push(`   Sale: ${formatFecha(o.fecha)}`);
      if (o.ciudad) lines.push(`   Ciudad: ${o.ciudad}`);
      if (o.telefono) lines.push(`   Celular: ${o.telefono}`);
      if (i < orders.length - 1) lines.push('');
    });

    lines.push('');
    lines.push(`Total: ${orders.length} pedido${orders.length !== 1 ? 's' : ''}`);

    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      document.getElementById('copy-success').classList.add('visible');
      setTimeout(() => {
        document.getElementById('copy-success').classList.remove('visible');
      }, 2500);
    });
  }

  function setLoading(val) {
    const btn = document.querySelector('.btn-primary');
    const loading = document.getElementById('loading');
    if (val) {
      loading.classList.add('visible');
      btn.disabled = true;
    } else {
      loading.classList.remove('visible');
      btn.disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function exportWord() {
    if (orders.length === 0) return;

    const dateStr = today.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });

    const rows = orders.map((o, i) => `
      <tr>
        <td style="width:30px;text-align:center;font-weight:bold;color:#6b2d3e;vertical-align:top;padding:8px 10px;">${i + 1}</td>
        <td style="padding:8px 10px;vertical-align:top;">
          <b style="font-size:13pt;">${escHtml(o.nombre) || '—'}</b><br>
          ${o.direccion ? `<span style="color:#555;">📍 ${escHtml(o.direccion)}</span><br>` : ''}
          ${o.fecha ? `<span style="color:#555;">📅 Sale ${formatFecha(o.fecha)}</span><br>` : ''}
          ${o.ciudad ? `<span style="color:#555;">🏙️ ${escHtml(o.ciudad)}</span><br>` : ''}
          ${o.telefono ? `<span style="color:#555;">📱 ${escHtml(o.telefono)}</span>` : ''}
        </td>
      </tr>
      <tr><td colspan="2" style="border-bottom:1px solid #e8d5d8;padding:0;"></td></tr>
    `).join('');

    const html = `
      <html xmlns:o="urn:schemas-microsoft-com:office:office"
            xmlns:w="urn:schemas-microsoft-com:office:word"
            xmlns="http://www.w3.org/TR/REC-html40">
      <head>
        <meta charset="UTF-8">
        <title>Pedidos Tropilla Vinos</title>
        <!--[if gte mso 9]><xml><w:WordDocument><w:View>Print</w:View></w:WordDocument></xml><![endif]-->
        <style>
          body { font-family: Calibri, Arial, sans-serif; font-size: 11pt; color: #1a1a1a; margin: 2cm; }
          h1 { font-size: 18pt; color: #6b2d3e; margin-bottom: 4px; }
          .subtitle { font-size: 10pt; color: #888; margin-bottom: 24px; }
          table { width: 100%; border-collapse: collapse; margin-top: 12px; }
          td { vertical-align: top; }
          .footer { margin-top: 32px; font-size: 9pt; color: #aaa; border-top: 1px solid #e0d0d2; padding-top: 10px; }
        </style>
      </head>
      <body>
        <h1>Tropilla Vinos — Pedidos del Día</h1>
        <div class="subtitle">${dateStr} &nbsp;|&nbsp; ${orders.length} pedido${orders.length !== 1 ? 's' : ''}</div>
        <table>
          <tbody>${rows}</tbody>
        </table>
        <div class="footer">Generado por Tropilla Pedidos App</div>
      </body>
      </html>
    `;

    const blob = new Blob(['\ufeff' + html], { type: 'application/msword' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pedidos-tropilla-${today.toISOString().slice(0,10)}.doc`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Permitir Ctrl+Enter para extraer
  document.getElementById('msg-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) extractData();
  });

  // Cargar pedidos del día al iniciar
  loadTodayOrders();
</script>

</body>
</html>
