<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Historial — Tropilla Pedidos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --wine: #6b2d3e;
      --wine-light: #9b4d5e;
      --wine-pale: #fdf0f2;
      --wine-border: #e8d5d8;
      --text: #1a1a1a;
      --text-muted: #777;
      --white: #fff;
      --gray-bg: #f7f7f7;
      --radius: 8px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--wine);
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    header .brand { font-size: 18px; font-weight: 600; }
    header a { color: rgba(255,255,255,0.8); font-size: 13px; text-decoration: none; border: 1px solid rgba(255,255,255,0.3); padding: 4px 12px; border-radius: 6px; }
    header a:hover { background: rgba(255,255,255,0.1); }

    .container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }

    .card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid var(--wine-border); font-size: 13px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--wine); display: flex; align-items: center; gap: 12px; }
    .card-body { padding: 20px; }

    .filter-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .filter-row label { font-size: 13px; font-weight: 600; color: var(--wine); }
    .filter-row input[type="date"] {
      border: 1.5px solid var(--wine-border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }
    .filter-row input[type="date"]:focus { border-color: var(--wine); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 9px 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500;
      cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .btn-primary { background: var(--wine); color: white; }
    .btn-primary:hover { background: var(--wine-light); }

    .badge { background: var(--wine); color: white; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }

    table { width: 100%; border-collapse: collapse; margin-top: 4px; }
    thead tr { border-bottom: 2px solid var(--wine-border); }
    th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--wine); }
    tbody tr { border-bottom: 1px solid var(--wine-border); transition: background 0.1s; }
    tbody tr:hover { background: var(--wine-pale); }
    td { padding: 12px; font-size: 14px; vertical-align: top; }
    td.muted { color: var(--text-muted); font-size: 13px; }

    .empty { text-align: center; padding: 50px 20px; color: var(--text-muted); font-size: 14px; }
    .empty .icon { font-size: 36px; margin-bottom: 10px; }

    .loading-row { text-align: center; padding: 30px; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>

<header>
  <div class="brand">Tropilla Vinos — Historial</div>
  <a href="/">← Volver</a>
</header>

<div class="container">
  <div class="card">
    <div class="card-header">
      <span>Pedidos por fecha</span>
      <span class="badge" id="total-badge">0</span>
    </div>
    <div class="card-body">

      <div class="filter-row" style="margin-bottom:20px;">
        <label>Fecha:</label>
        <input type="date" id="fecha-filtro">
        <button class="btn btn-primary" onclick="cargarPedidos()">Buscar</button>
      </div>

      <div id="tabla-container">
        <div class="loading-row">Seleccioná una fecha para ver los pedidos.</div>
      </div>

    </div>
  </div>
</div>

<script>
  // Precargar con la fecha de hoy
  const hoy = new Date();
  const yyyy = hoy.getFullYear();
  const mm = String(hoy.getMonth() + 1).padStart(2, '0');
  const dd = String(hoy.getDate()).padStart(2, '0');
  document.getElementById('fecha-filtro').value = `${yyyy}-${mm}-${dd}`;

  cargarPedidos();

  async function cargarPedidos() {
    const fecha = document.getElementById('fecha-filtro').value;
    if (!fecha) return;

    document.getElementById('tabla-container').innerHTML = '<div class="loading-row">Cargando...</div>';

    try {
      const res = await fetch(`/api/orders?fecha=${fecha}`);
      const json = await res.json();

      if (!json.success) throw new Error(json.error);

      const pedidos = json.data;
      document.getElementById('total-badge').textContent = pedidos.length;

      if (pedidos.length === 0) {
        document.getElementById('tabla-container').innerHTML = `
          <div class="empty">
            <div class="icon">📭</div>
            No hay pedidos para esta fecha.
          </div>`;
        return;
      }

      const filas = pedidos.map((p, i) => `
        <tr>
          <td style="color:var(--text-muted);font-size:13px;">${i + 1}</td>
          <td><strong>${escHtml(p.nombre) || '—'}</strong></td>
          <td class="muted">${escHtml(p.direccion) || '—'}</td>
          <td class="muted">${escHtml(p.ciudad) || '—'}</td>
          <td class="muted">${escHtml(p.telefono) || '—'}</td>
          <td class="muted">${p.created_at ? new Date(p.created_at).toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' }) : '—'}</td>
        </tr>
      `).join('');

      document.getElementById('tabla-container').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Dirección</th>
              <th>Ciudad</th>
              <th>Celular</th>
              <th>Hora</th>
            </tr>
          </thead>
          <tbody>${filas}</tbody>
        </table>`;

    } catch (err) {
      document.getElementById('tabla-container').innerHTML = `
        <div class="empty">Error al cargar: ${err.message}</div>`;
    }
  }

  function escHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  document.getElementById('fecha-filtro').addEventListener('keydown', e => {
    if (e.key === 'Enter') cargarPedidos();
  });
</script>

</body>
</html>
